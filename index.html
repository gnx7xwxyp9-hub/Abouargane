{id:"s1",mod:"sc",disc:"Handball",volet:"Réglementaire",niv:"Connaître / Comprendre",pts:1,q:"Quelles sont les dimensions réglementaires d'un terrain de handball ? Citez la zone de but et la ligne de jet franc.",rep:["40m × 20m","Zone de but : demi-cercle rayon 6m","Ligne de jet franc (pointillés) : 9m","Ligne de penalty (jet de 7m) : à 7m des buts"]},
{id:"s2",mod:"sc",disc:"Handball",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez les phases de la contre-attaque en handball en précisant le rôle de chaque acteur.",rep:["Phase 1 : récupération du ballon et passe immédiate au demi-centre","Phase 2 : demi-centre lance la contre-attaque par longue passe vers l'espace libre","Phase 3 : finition en surnombre avant la réorganisation défensive adverse"]},
{id:"s3",mod:"sc",disc:"Handball",volet:"Réglementaire",niv:"Appliquer",pts:2,q:"En handball, dans quelles situations un jet de 7m (penalty) est-il accordé ? Citez 3 cas.",rep:["Faute sur un joueur en position de tir clair face au gardien","Faute à l'intérieur de la zone de but sur un joueur en possession","Comportement antisportif grave empêchant un but certain"]},
{id:"s4",mod:"sc",disc:"Basketball",volet:"Réglementaire",niv:"Connaître / Comprendre",pts:1,q:"Quelle est la différence entre une faute et une violation en basketball ? Donnez un exemple de chaque.",rep:["Faute : contact illégal entre joueurs (ex : pushing) → tirs francs ou remise en jeu","Violation : infraction sans contact (ex : marcher, 3 secondes) → remise en jeu adverse"]},
{id:"s5",mod:"sc",disc:"Basketball",volet:"Technique",niv:"Appliquer",pts:2,q:"Décrivez un système offensif 3-2 en basketball et une combinaison tactique utilisant un écran.",rep:["3-2 : 3 joueurs en ligne haute (2 ailiers + meneur) + 2 pivots/intérieurs","Écran : meneur utilise l'écran posé par le pivot pour se démarquer et prendre un tir","L'écran doit être légal (joueur fixe, pieds au sol, pas de contact)"]},
{id:"s6",mod:"sc",disc:"Football",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Comparez en 4 points la défense homme à homme et la défense en zone en football.",rep:["Homme/homme : chaque défenseur suit un attaquant précis → pression individuelle forte","Zone : chaque défenseur protège une zone du terrain → organisation collective","Avantage H/H : harcèlement individuel efficace, utile en fin de match","Avantage zone : économise les efforts, garde la structure, sûre contre les rotations"]},
{id:"s7",mod:"sc",disc:"Entraînement",volet:"Entraînement",niv:"Appliquer",pts:2,q:"Proposez 2 exercices pour développer l'explosivité adaptée au basketball. Décrivez : dispositif, dosage, qualité ciblée.",rep:["Squat-jump (3×8) — quadriceps, fessiers — explosivité concentrique pour le rebond","Navettes 5-10-15m (5 séries, récup 1min30) — accélération, décélération, changement de direction"]},
// ── VOLLEYBALL ──
{id:"v1",mod:"vb",disc:"Règlement",volet:"Réglementaire",niv:"Connaître / Comprendre",pts:1,q:"Expliquez le système de marque actuel en volleyball (rally point). Comment gagne-t-on un set et un match ?",rep:["Rally point : chaque échange donne un point au gagnant qu'on serve ou non","Gain d'un set : 25 points avec 2 points d'écart (15 points au set décisif)","Gain du match : 3 sets gagnants sur 5 (2 sur 3 en compétition scolaire)"]},
{id:"v2",mod:"vb",disc:"Règlement",volet:"Réglementaire",niv:"Appliquer",pts:2,q:"Quel est le rôle du libero ? Citez 2 restrictions réglementaires spécifiques.",rep:["Rôle : spécialiste défensif et réceptionneur, joue uniquement en position arrière","Maillot différent obligatoire pour être identifiable par les arbitres","Restriction 1 : ne peut pas attaquer au-dessus du bord supérieur du filet","Restriction 2 : ne peut pas servir ni bloquer"]},
{id:"v3",mod:"vb",disc:"Technique",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez la technique d'exécution de la manchette : position du corps, des bras, point de contact.",rep:["Corps : jambes fléchies, poids sur avant-pieds, buste penché en avant","Bras : coudes tendus, mains liées (prise en coupe ou croisée), avant-bras en plateforme plane","Point de contact : partie inférieure des avant-bras, ~10 cm au-dessus du poignet"]},
{id:"v4",mod:"vb",disc:"Tactique",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez le système de réception en W (5 joueurs). Responsabilités de chaque poste.",rep:["5 joueurs forment un W devant le filet, passeur non réceptionnaire","Zone 1 (arrière droit) : balles courtes côté droit","Zone 5 (arrière gauche) : balles courtes côté gauche","Zone 6 (arrière centre) : balles longues"]},
{id:"v5",mod:"vb",disc:"Entraînement",volet:"Entraînement",niv:"Appliquer",pts:2,q:"Analysez les avantages et limites du système offensif 5-1 en VB scolaire.",rep:["5-1 : 1 seul passeur + 5 attaquants — passeur toujours en jeu","Avantage : cohérence du jeu, expertise du passeur","Limite : si passeur absent ou faible, tout le système s'effondre","Adaptation scolaire : rotation du rôle de passeur chaque séance"]},
// ── GAS ──
{id:"g1",mod:"gas",disc:"Règlement GAS",volet:"Réglementaire",niv:"Connaître / Comprendre",pts:1,q:"Que signifie la 'Difficulté' (D) en GAS et quel est le principe de compensation des familles ?",rep:["Difficulté (D) = somme des valeurs des éléments gymniques les plus difficiles réalisés", "Note finale GAS = Difficulté (D) + Exécution (E) + Composition (familles gymniques)", "Compensation 1 : une difficulté manquante peut être partiellement remplacée par une difficulté inférieure (valant alors 0,25 pt)", "Compensation 2 : une difficulté supérieure peut remplacer une difficulté inférieure"]},
{id:"g2",mod:"gas",disc:"Règlement GAS",volet:"Réglementaire",niv:"Connaître / Comprendre",pts:1,q:"Comment se compose la note finale en GAS selon le Code de Pointage OP 2009 ? Citez les trois composantes.",rep:["Note de Difficulté (D) : valeur des éléments gymniques réalisés (additive)", "Note d'Exécution (E) : sur 10 points avec déductions pour fautes", "Note de Composition : présence d'au minimum 4 familles gymniques exigées", "Note finale = D + E + Composition"]},
{id:"g3",mod:"gas",disc:"Règlement GAS",volet:"Réglementaire",niv:"Connaître / Comprendre",pts:1,q:"Quelles sont les principales fautes entraînant une déduction sur la note d'Exécution (E) en GAS ? Citez 3 exemples avec leur pénalité.",rep:["Chute sur les mains ou les genoux : −1,00 pt sur E", "Grande faute d'exécution (jambes fléchies, pieds écartés) : −0,30 pt", "Faute moyenne (manque d'amplitude, léger déséquilibre) : −0,10 pt"]},
{id:"g4",mod:"gas",disc:"Règlement GAS",volet:"Réglementaire",niv:"Appliquer",pts:2,q:"Un gymnaste réalise un enchaînement : D = 4,0 pts, Composition = 1,6 pts. Il commet une chute (−1,0), deux fautes moyennes (−0,1 chacune) et une sortie (−0,1). E départ = 10,0. Calculez la note finale.",rep:["Total déductions E = 1,0 + 0,1 + 0,1 + 0,1 = 1,3 pts", "Note E = 10,0 − 1,3 = 8,7", "Note finale = D + Composition + E = 4,0 + 1,6 + 8,7 = 14,3 points"]},
{id:"g5",mod:"gas",disc:"Règlement GAS",volet:"Réglementaire",niv:"Appliquer",pts:2,q:"Deux gymnastes sont à égalité de note finale (13,5). Gymnaste A : D=5,5 / E=8,0. Gymnaste B : D=4,5 / E=9,0. Lequel est classé premier selon le règlement OP 2009 ? Justifiez.",rep:["En cas d'égalité de note finale, le règlement retient la meilleure note E", "Gymnaste B (E=9,0) est classé PREMIER devant Gymnaste A (E=8,0)", "Principe docimologique : l'exécution prime sur la difficulté en cas d'égalité\nRéférence : Code de Pointage OP 2009 — Procédure de départage"]},
{id:"g6",mod:"gas",disc:"Scientifique GAS",volet:"Scientifique",niv:"Connaître / Comprendre",pts:1,q:"Quelles sont les principales articulations sollicitées lors de l'exécution d'un Appui Tendu Renversé (ATR) ? Précisez le type de contrainte pour chacune.",rep:["Épaules : flexion maximale + abduction → mise en tension de la coiffe des rotateurs", "Poignets : extension forcée → support de la totalité du poids corporel", "Colonne cervicale : légère extension → vigilance posturale (gainage cervical)", "Colonne lombaire : risque d'hyperlordose si gainage abdominal insuffisant\nRéférence : Anatomie fonctionnelle — Kapandji / Analyse biomécanique GAS"]},
{id:"g7",mod:"gas",disc:"Scientifique GAS",volet:"Scientifique",niv:"Connaître / Comprendre",pts:1,q:"Définissez le concept de 'gainage musculaire' et expliquez son rôle spécifique dans la pratique de la Gymnastique Artistique.",rep:["Gainage = contraction isométrique simultanée des muscles du tronc (abdominaux, obliques, érecteurs du rachis)", "Action de rétroversion pelvienne : bascule du bassin vers l'arrière pour verrouiller la colonne lombaire", "Rôle 1 : maintenir l'axe corporel rigide pendant les éléments (ATR, salto)", "Rôle 2 : transmettre les forces d'impulsion sans perte d'énergie", "Rôle 3 : prévenir les blessures lombaires lors des réceptions"]},
{id:"g8",mod:"gas",disc:"Scientifique GAS",volet:"Scientifique",niv:"Connaître / Comprendre",pts:1,q:"Analysez le rôle biomécanique du moment d'inertie dans les éléments gymniques comportant une rotation (salto, vrille). Comment le gymnaste le modifie-t-il ?",rep:["Moment d'inertie (I) = résistance d'un corps à la rotation autour d'un axe", "I augmente quand les membres sont éloignés de l'axe de rotation (position carpée/tendue)", "I diminue quand les membres sont regroupés près du centre (position groupée)", "Gymnaste : se regroupe pour accélérer la rotation → s'étend pour la ralentir avant réception", "Loi de conservation du moment cinétique : L = I × ω = constante\nRéférence : Mécanique du corps humain — Biomécanique des rotations en GAS"]},
{id:"g9",mod:"gas",disc:"Scientifique GAS",volet:"Scientifique",niv:"Appliquer",pts:2,q:"Un élève de 4ème réalise un salto avant avec une rotation insuffisante. À partir des principes biomécaniques, identifiez les causes possibles et proposez deux corrections ciblées.",rep:["Cause 1 : impulsion insuffisante (genou pas assez fléchi avant extension) → correction : exercice de saut en hauteur avec marqueur à dépasser", "Cause 2 : bras n'accompagnent pas le mouvement de rotation (pas de lancer) → correction : exercice avec lancer des bras vers le haut au moment de l'impulsion", "Cause 3 : position trop carpée/ouverte → correction : travail du regroupement en trampoline ou en fosse", "Principe : augmenter I lors de l'impulsion, diminuer I pendant la rotation\nRéférence : Pédagogie de la GAS — Méthode analytique d'observation/correction"]},
{id:"g10",mod:"gas",disc:"Scientifique GAS",volet:"Scientifique",niv:"Appliquer",pts:2,q:"Lors de la réception d'un saut de main, un élève tombe en arrière systématiquement. Analysez uniquement les causes biomécaniques.",rep:["Centre de masse (CM) projeté en arrière de la base de sustentation à la réception", "Manque d'amplitude de la poussée des bras (impulsion incomplète au sol)", "Regard dirigé vers le bas → déséquilibre antéropostérieur", "Jambes trop raides à l'impact → absence d'amortissement par triple flexion"]},
{id:"g11",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Listez les 5 familles d'éléments gymniques au sol en GAS et donnez un exemple pour chacune.",rep:["Roulement : roulade avant, roulade arrière", "Renversement : roue, rondade, ATR", "Rotation : salto avant, salto arrière", "Attitude (équilibre) : ATR maintenu, planche, arabesque", "Mouvement de souplesse : pont, grand écart, souplesse avant"]},
{id:"g12",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez les 3 phases techniques de la roulade avant groupée.",rep:["Phase 1 — Mise en action : flexion jambes, mains au sol largeur d'épaules, menton sur la poitrine", "Phase 2 — Roulement : contact nuque puis dos arrondi, transfert du poids vers les fesses en position groupée", "Phase 3 — Redressement : élan des bras vers l'avant, extension pour finir debout"]},
{id:"g13",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez les 3 phases techniques de la roulade arrière groupée et le critère de sécurité cervical.",rep:["Phase 1 — Mise en action : accroupi, dos arrondi, mains posées près des oreilles (paumes vers le ciel)", "Phase 2 — Roulement : bascule arrière groupée, appui actif des mains pour décharger les cervicales", "Phase 3 — Redressement : poussée des bras et extension pour finir accroupi ou debout", "Sécurité : l'appui des mains est indispensable pour protéger les cervicales"]},
{id:"g14",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez les 3 phases techniques de la roue en précisant les appuis successifs.",rep:["Phase 1 — Pose des mains : main puis main alignées dans l'axe du déplacement, corps qui bascule", "Phase 2 — Passage à l'ATR latéral : corps aligné jambes écartées, passage par la verticale renversée", "Phase 3 — Réception : pied puis pied posés successivement, retour à la position debout de face"]},
{id:"g15",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Qu'est-ce qu'un 'élément de liaison' en GAS ? Quel est son rôle dans la notation ? Donnez deux exemples.",rep:["Élément de liaison : élément gymnasique qui assure la transition entre deux éléments acrobatiques de familles différentes", "Rôle dans la notation : valorise l'enchaînement fluide (bonus de liaison dans certains codes), maintient la dynamique du parcours sans rupture de rythme", "Exemple 1 : fente avant entre une roulade et une roue", "Exemple 2 : tour sur une jambe (pirouette de danse) entre deux acrobaties\nRéférence : OP 2009 — Bonification de liaison / Continuité du parcours gymnique"]},
{id:"g16",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Définissez le 'parcours gymnique' en GAS scolaire. Quels sont les critères minimaux de validité, dont le critère de sécurité ?",rep:["Parcours gymnique : enchaînement d'éléments reliés de manière continue sur le praticable", "Critère 1 : nombre minimal d'éléments imposé (ex. 5 éléments)", "Critère 2 : représentation d'au moins 2 familles d'éléments différentes", "Critère 3 : utilisation de l'espace (déplacements dans au moins 2 directions)", "Critère de sécurité : éléments adaptés au niveau de l'élève, réception maîtrisée, pas d'élément non préparé"]},
{id:"g17",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez la technique de l'ATR (Appui Tendu Renversé) en précisant : position des bras, du corps, de la tête et des jambes.",rep:["Bras : tendus, verticaux, mains à largeur d'épaules, doigts écartés pointant en avant", "Corps : aligné de la tête aux talons (gainage total), hanches dans l'axe des épaules", "Tête : légèrement en extension, regard entre les mains (pas vers le bas)", "Jambes : serrées, tendues, pointes de pieds étirées vers le haut", "Équilibre : corrections par les doigts (appui) et les épaules (bascule légère)\nRéférence : Technique gymnique — Famille des éléments d'équilibre renversé"]},
{id:"g18",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Qu'est-ce que la 'rondade' en GAS ? Comment se distingue-t-elle de la roue et quel élément permet-elle d'enchaîner ?",rep:["Rondade : élément acrobatique dérivé de la roue, avec une rotation de 180° pour finir en position dos à la direction d'élan (pieds joints)", "Différence avec la roue : la rondade se termine PIEDS JOINTS et FACE AU SOL (direction inverse), alors que la roue se termine de profil", "Enchaînement permis : la rondade permet d'enchaîner un flip arrière (flip arrière) ou un salto arrière car le gymnaste repart vers l'arrière", "Phase spécifique : la rotation du bassin dans le plan frontal pendant l'appui\nRéférence : Classification des éléments acrobatiques — GAS sol"]},
{id:"g19",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Citez et définissez les 3 positions corporelles codifiées en gymnique acrobatique pour les éléments en rotation (salto).",rep:["Position GROUPÉE : genoux et hanches fléchis à 90°, corps ramassé sur lui-même — moment d'inertie minimal = rotation maximale", "Position CARPÉE : hanches fléchies à 90°, jambes tendues, corps plié à la hanche — inertie intermédiaire", "Position TENDUE/VRILLÉE : corps entièrement allongé, bras le long du corps — moment d'inertie maximal = rotation plus lente mais esthétique\nRéférence : Code de Pointage FIG — Nomenclature des positions de vol"]},
{id:"g20",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Décrivez la technique d'exécution du saut de main en précisant les phases des bras et des jambes.",rep:["Départ : course d'élan, pose des deux mains au sol bras tendus, corps aligné", "Phase 1 — Appui : transfert du poids sur les mains, jambe d'attaque lancée vers le haut", "Phase 2 — Renversement : passage par l'ATR, poussée dynamique des épaules et des bras", "Phase 3 — Réception : ouverture du corps, arrivée sur les deux pieds, bras vers le haut"]},
{id:"g21",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Construisez un parcours gymnique de 5 éléments appartenant à au moins 3 familles différentes selon OP 2009. Précisez l'ordre, la famille et la logique de progression.",rep:["Parcours proposé : (1) Fente avant [liaison/danse] → (2) Roulade avant groupée [acrobatique avant] → (3) ATR-pont [équilibre renversé] → (4) Roue [renversement latéral] → (5) Rondade [acrobatique arrière-préparatoire]", "Familles couvertes : Liaison/danse | Acrobatique avant | Équilibre renversé | Renversement latéral | Acrobatique arrière", "Logique de progression : du sol vers le renversé → du statique vers le dynamique → de l'avant vers l'arrière", "Valeur pédagogique : chaque élément prépare le suivant (roulade → ATR : même axe avant) (ATR-pont → roue : même renversement)\nRéférence : Pédagogie GAS — Construction de parcours / Progressivité des apprentissages"]},
{id:"g22",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Un élève exécute une roue avec les jambes fléchies et les bras qui se plient. Identifiez les 2 erreurs et proposez un exercice correctif pour chacune.",rep:["Erreur 1 — Jambes fléchies : tonicité insuffisante (quadriceps, fessiers) en position renversée → Exercice : roue contre un mur pour forcer l'extension", "Erreur 2 — Bras qui se plient : force des extenseurs d'épaule insuffisante → Exercice : ATR contre mur 10 sec pour renforcer les épaules", "Critère de réussite : le corps passe par un plan vertical vu de face, sans cassure à la hanche"]},
{id:"g23",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Proposez une progression pédagogique en 3 étapes pour l'apprentissage de la roue pour des collégiens débutants.",rep:["Étape 1 — Pré-requis : ATR contre mur + déplacement latéral mains-pieds → sentir l'alignement renversé", "Étape 2 — Initiation guidée : roue par-dessus un banc bas ou une ligne tracée → guider la trajectoire des appuis", "Étape 3 — Autonomisation : roue complète libre, jambes tendues et écartées → recherche de l'amplitude et de la verticalité", "Critères de validation : alignement vertical, jambes tendues, passage des 4 appuis dans l'axe"]},
{id:"g24",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Un élève présente un ATR non tenu (bascule immédiate vers l'avant). Sans matériel spécifique, proposez 3 exercices de remédiation utilisables en classe.",rep:["Exercice 1 : ATR contre le mur (dos au mur) — travail de l'alignement et de la durée de tenue (5-10 sec)", "Exercice 2 : ATR avec partenaire (un tient les chevilles) — décharge la peur et permet de corriger le gainage sans risque", "Exercice 3 : Poirier sur avant-bras (chandelle) → transition progressive vers ATR complet — renforce le gainage en position renversée", "Critère de réussite : tenir l'ATR 3 secondes minimum avec corps aligné, sans aide\nRéférence : Pédagogie GAS — Remédiation ATR sans matériel spécifique"]},
{id:"g25",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Comment évalueriez-vous le niveau technique de la roulade avant chez vos élèves ? Proposez 4 critères d'observation précis et observables.",rep:["Critère 1 — Sécurité : appui de la nuque (jamais de la tête) avec menton sur la poitrine : OUI / NON", "Critère 2 — Alignement : dos arrondi en contact continu avec le sol (pas de coup de reins) : OUI / NON", "Critère 3 — Dynamique : utilisation de l'élan pour finir debout sans aide des mains au sol : OUI / NON", "Critère 4 — Groupé : genoux joints et serrés contre la poitrine pendant toute la phase de roulade : OUI / NON", "Notation : 4 critères observés = très bien / 3 = bien / 2 = assez bien / 1-0 = insuffisant\nRéférence : Grille d'évaluation GAS scolaire — Critères d'observation objectifs"]},
{id:"g26",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Décrivez comment enseigner la rondade à des élèves ayant déjà maîtrisé la roue. Quels sont les points techniques à ajouter et comment les introduire ?",rep:["Point technique 1 : quart de tour du bassin pendant la phase d'appui (2 mains au sol) → exercice : roue avec pied d'arrivée orienté 45° puis 90° progressivement", "Point technique 2 : fermeture des pieds au moment du retour au sol → exercice avec cerceaux pour guider l'atterrissage pieds joints", "Point technique 3 : impulsion finale vers le haut et l'arrière (pour enchaîner flip) → exercice avec mini-trampoline ou zone rebond en fin de rondade", "Vérification : le gymnaste doit finir DOS au sens de son élan, pieds joints, bras vers l'avant-haut\nRéférence : Progression roue → rondade — Technique gymnique avancée"]},
{id:"g27",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Connaître / Comprendre",pts:1,q:"Quelles sont les actions musculaires principales lors de la phase d'impulsion d'un saut vertical en GAS ? Citez les muscles et leur rôle.",rep:["Quadriceps : extension du genou → propulsion verticale", "Triceps sural (mollet) : extension de la cheville → poussée finale (gainage de la chaîne)", "Fessiers : extension de la hanche → puissance de l'impulsion", "Gainage abdominal : transmet la force des jambes vers le haut du corps sans perte"]},
{id:"g28",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Citez les 3 erreurs les plus fréquentes lors de la roulade arrière chez les débutants et proposez une correction pour chacune.",rep:["Erreur 1 — Mains mal placées : pas d'appui pour décharger la nuque → Correction : poser les mains près des oreilles, paumes vers le ciel", "Erreur 2 — Dos non arrondi : roulement bloqué → Correction : rester groupé, menton sur la poitrine tout le long", "Erreur 3 — Manque d'élan : reste bloqué sur le dos → Correction : départ dynamique, pousser fort sur les mains au passage"]},
{id:"g29",mod:"gas",disc:"Technique GAS",volet:"Technique",niv:"Appliquer",pts:2,q:"Quels sont les critères d'observation pour évaluer un ATR (Appui Tendu Renversé) chez un élève ? Citez-en 4.",rep:["Critère 1 — Alignement : corps droit de la tête aux pieds (pas de cassure à la hanche)", "Critère 2 — Gainage : tronc tonique, pas de creux lombaire", "Critère 3 — Tenue : maintien de l'équilibre 3 secondes minimum", "Critère 4 — Jambes : tendues et serrées, pointes de pieds étirées"]},
{id:"g30",mod:"gas",disc:"Règlement GAS",volet:"Réglementaire",niv:"Connaître / Comprendre",pts:1,q:"Citez les familles gymniques qui doivent être représentées dans un enchaînement GAS et le nombre minimal exigé.",rep:["Familles : roulement, renversement, rotation, attitude (équilibre), mouvement de souplesse", "Minimum 4 familles différentes doivent être représentées dans l'enchaînement", "Chaque famille présente contribue à la note de Composition", "L'absence d'une famille exigée entraîne une pénalité de composition"]},
{id:"g31",mod:"gas",disc:"Entraînement GAS",volet:"Entraînement",niv:"Connaître / Comprendre",pts:1,q:"Quelles sont les qualités physiques spécifiques prioritaires en Gymnastique Artistique ? Classez-les par ordre d'importance pédagogique.",rep:["1. Coordination (indispensable pour enchaîner et contrôler les éléments)", "2. Souplesse / mobilité articulaire (sécurité des gestes + esthétique)", "3. Force-gainage (support de tous les éléments portés et acrobatiques)", "4. Équilibre / proprioception (maintien en ATR, réceptions)", "5. Explosivité / détente verticale (sauts, impulsions)", "Note pédagogique : la coordination et la souplesse sont les plus difficiles à développer tardivement → priorité aux jeunes\nRéférence : Physiologie de l'entraînement GAS / Bompa — Développement des qualités physiques"]},

{id:"g39",mod:"gas",disc:"Entraînement GAS",volet:"Entraînement",niv:"Appliquer",pts:2,q:"Proposez 3 situations d'apprentissage pour développer l'explosivité et la détente verticale spécifique à la GAS chez des collégiens de 14 ans.",rep:["Situation 1 — Sauts à la corde : 3 × 30 sec saut continu bipodal → développe la réactivité du triceps sural et le rythme de saut", "Situation 2 — Sauts de haies basses (30 cm) en file : accent sur l'amortissement et la propulsion → 3 séries de 6 haies", "Situation 3 — Squat-jump avec réception contrôlée : 3 × 8 répétitions → explosivité concentrique + freinage excentrique", "Critères GAS spécifiques : la réception doit toujours être amortie (triple flexion) pour transférer à la réception des sauts gymniques", "Progression : commencer sans matériel → ajouter hauteur ou distance progressivement sur 4 semaines\nRéférence : Développement de la détente — Entraînement pliométrique adapté aux adolescents"]},

];

// ── STATE (accès direct, sans login ni validation formateur) ──
const LOCAL_UID="guest-local"; // identifiant fixe utilisé pour sauvegarder/charger la progression
let ST={uid:LOCAL_UID,name:"Étudiant",mod:"ath",volet:"Toutes",disc:"Toutes",answers:{},revealed:{},timers:{},evals:{}};

// ── API ──
async function apiGet(p){ const u=API+"?token="+encodeURIComponent(TOKEN)+"&"+new URLSearchParams(p); const r=await fetch(u); return r.json(); }
async function apiPost(d){ const r=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({...d,token:TOKEN})}); return r.json(); }

// ── XSS SAFE ──
function safe(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function ini(n){const p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.substring(0,2).toUpperCase();}

// ── INIT — chargement direct de l'app, sans écran de connexion ──
async function initApp(){
  try{
    const evRes=await apiGet({action:"getEvals",email:LOCAL_UID});
    ST.evals=evRes||{};
  }catch(e){ /* pas de réseau : on continue avec une progression vide */ }
  renderAll();
}

// ── HELPERS ──
function curMod(){return MODULES.find(m=>m.id===ST.mod)||MODULES[0];}
function modQs(mid){return QUESTIONS.filter(q=>q.mod===mid);}
function curQs(){
  return QUESTIONS.filter(q=>{
    if(q.mod!==ST.mod) return false;
    if(ST.volet!=="Toutes" && q.volet!==ST.volet) return false;
    if(ST.disc!=="Toutes" && q.disc!==ST.disc) return false;
    return true;
  });
}
function myEv(){return ST.evals[ST.mod]||{};}

// ── RENDER ──
function renderAll(){renderMods();renderConform();renderStats();renderVolets();renderDiscs();renderQs();}

function renderMods(){
  document.getElementById("mod-row").innerHTML=MODULES.map(m=>{
    const qs=modQs(m.id), ev=ST.evals[m.id]||{};
    const done=qs.filter(q=>ev[q.id]!==undefined).length;
    return`<button class="mod-btn${m.id===ST.mod?" act":""}" onclick="switchMod('${m.id}')"
      style="${m.id===ST.mod?"background:"+m.color+";border-color:"+m.color:""}">
      <span class="mod-dot" style="background:${m.id===ST.mod?"rgba(255,255,255,.5)":m.color}"></span>
      ${safe(m.label)} <span style="font-size:9px;opacity:.7">${done}/${qs.length}</span>
    </button>`;
  }).join("");
}
function switchMod(id){ST.mod=id;ST.volet="Toutes";ST.disc="Toutes";renderAll();}

function renderConform(){
  const mqs=modQs(ST.mod), ev=myEv();
  document.getElementById("conform-box").innerHTML=`<div class="conform-title">Conformité par volet</div>
  <div class="conform-grid">${VOLETS.slice(1).map(v=>{
    const vqs=mqs.filter(q=>q.volet===v.id);
    const done=vqs.filter(q=>ev[q.id]!==undefined).length;
    const ok=vqs.filter(q=>ev[q.id]===2).length;
    const pct=vqs.length?Math.round(done/vqs.length*100):0;
    return`<div class="cv-item">
      <div class="cv-label" style="color:${v.col}"><span>${v.id}</span><span>${done}/${vqs.length}</span></div>
      <div class="cv-bar-wrap"><div class="cv-bar" style="width:${pct}%;background:${v.col}"></div></div>
      <span class="cv-count" style="color:${v.col}">${ok} maîtrisées</span>
    </div>`;
  }).join("")}</div>`;
}

function renderStats(){
  const qs=modQs(ST.mod), ev=myEv(), total=qs.length;
  const done=qs.filter(q=>ev[q.id]!==undefined).length;
  const ok=qs.filter(q=>ev[q.id]===2).length;
  const part=qs.filter(q=>ev[q.id]===1).length;
  document.getElementById("s-done").textContent=done;
  document.getElementById("s-ok").textContent=ok;
  document.getElementById("s-part").textContent=part;
  document.getElementById("s-pct").textContent=total?Math.round(done/total*100)+"%":"0%";
  const pb=document.getElementById("pb");
  pb.style.width=(total?done/total*100:0)+"%";pb.style.background=curMod().color;
}

function renderLbSkel(){document.getElementById("lb-list").innerHTML='<div class="empty" style="padding:.3rem">Chargement…</div>';}
async function refreshLb(){
  try{
    const [users,evals]=await Promise.all([apiGet({action:"getUsers"}),apiGet({action:"getAllEvals"})]);
    const mid=ST.mod, mod=curMod();
    const rows=(users||[]).filter(u=>u.status==="approved").map(u=>{
      const ev=(evals&&evals[u.email]&&evals[u.email][mid])||{};
      const qs=modQs(mid), total=qs.length;
      const done=qs.filter(q=>ev[q.id]!==undefined).length;
      const ok=qs.filter(q=>ev[q.id]===2).length;
      return{name:u.name,group:u.group,done,ok,total,pct:total?Math.round(done/total*100):0};
    }).sort((a,b)=>b.ok-a.ok||b.done-a.done);
    const el=document.getElementById("lb-list");
    if(!rows.length){el.innerHTML='<div class="empty" style="padding:.25rem">Aucun étudiant approuvé.</div>';return;}
    el.innerHTML=rows.map((r,i)=>`<div class="lrow">
      <div class="lrank">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
      <div class="avatar" style="width:20px;height:20px;font-size:8px;background:#1A5276;flex-shrink:0">${ini(r.name)}</div>
      <div class="lname">${safe(r.name)} <span style="font-size:10px;color:#888">${safe(r.group)}</span></div>
      <div class="lscore">${r.ok} ✓</div>
      <div class="lpct">${r.pct}%</div>
    </div>`).join("");
  }catch(e){}
}

function renderVolets(){
  const mqs=modQs(ST.mod), ev=myEv();
  const all=mqs.length, allDone=mqs.filter(q=>ev[q.id]!==undefined).length;
  document.getElementById("volet-row").innerHTML=VOLETS.map(v=>{
    const isAll=v.id==="Toutes";
    const vqs=isAll?mqs:mqs.filter(q=>q.volet===v.id);
    const done=vqs.filter(q=>ev[q.id]!==undefined).length;
    const act=ST.volet===v.id;
    const col=isAll?"#1A1A1A":v.col;
    return`<button class="volet-btn${act?" act":""}" onclick="switchVolet('${v.id}')"
      style="${act?"background:"+col+";border-color:"+col:"border-left:3px solid "+col}">
      ${v.icon} ${v.id}
      <span class="volet-badge">${done}/${vqs.length}</span>
    </button>`;
  }).join("");
}
function switchVolet(v){ST.volet=v;ST.disc="Toutes";renderVolets();renderDiscs();renderQs();}

function renderDiscs(){
  const mqs=modQs(ST.mod);
  const filtered=ST.volet==="Toutes"?mqs:mqs.filter(q=>q.volet===ST.volet);
  const discs=["Toutes",...new Set(filtered.map(q=>q.disc))];
  const col=ST.volet==="Toutes"?curMod().color:VCOL[ST.volet]||curMod().color;
  document.getElementById("disc-label").textContent="Discipline"+(ST.volet!=="Toutes"?" · "+ST.volet:"");
  document.getElementById("disc-row").innerHTML=discs.map(d=>`
    <button class="disc-btn${d===ST.disc?" act":""}" onclick="switchDisc('${d}')"
      style="${d===ST.disc?"background:"+col+";color:#fff;border-color:"+col:""}">
      ${safe(d)}
    </button>`).join("");
}
function switchDisc(d){ST.disc=d;renderDiscs();renderQs();}

function renderQs(){
  const qs=curQs(), ev=myEv();
  const el=document.getElementById("q-list");
  if(!qs.length){el.innerHTML='<div class="empty">Aucune question pour cette sélection.</div>';return;}
  const vbg={"Réglementaire":"b-regl","Scientifique":"b-sci","Technique":"b-tech","Entraînement":"b-entr"};
  const nbg={"Connaître / Comprendre":"b-conn","Appliquer":"b-appl","Analyser":"b-anal"};
  let html="", lastV="";
  qs.forEach(q=>{
    if(q.volet!==lastV && ST.volet==="Toutes"){
      html+=`<div class="sec-banner" style="background:${VBG[q.volet]||"#eee"};color:${VCOL[q.volet]||"#333"}">
        ■ ${safe(q.volet)}
      </div>`;
      lastV=q.volet;
    }
    const evl=ev[q.id];
    const evb=evl===2?'<span class="badge b-done">✓ Maîtrisée</span>':
               evl===1?'<span class="badge b-part">~ En cours</span>':
               evl===0?'<span class="badge" style="background:#FFEBEE;color:#C62828">✗ Retravailler</span>':"";
    html+=`<div class="qcard">
      <div class="qinner">
        <div class="stripe" style="background:${VCOL[q.volet]||"#888"}"></div>
        <div style="flex:1">
          <div class="qhead">
            <div class="qmeta">
              <span style="font-size:9px;font-weight:700;color:#AAA">${safe(q.id.toUpperCase())}</span>
              <span class="badge ${vbg[q.volet]||"b-conn"}">${safe(q.volet)}</span>
              <span class="badge ${nbg[q.niv]||"b-conn"}">${safe(q.niv.replace("Connaître / Comprendre","Connaître"))}</span>
              <span class="badge b-conn">${q.pts}pt${q.pts>1?"s":""}</span>${evb}
            </div>
            <div class="tmr" id="tmr-${q.id}">⏱ 0:00</div>
          </div>
          <div class="qtext">${safe(q.q)}</div>
          <div class="qsub">Rédigez votre réponse (max 10 min) :</div>
          <textarea id="ans-${q.id}" placeholder="Votre réponse…" onfocus="startTmr('${q.id}')">${ST.answers[q.id]||""}</textarea>
          <div class="btn-row">
            <button class="qbtn qbtn-pri" onclick="reveal('${q.id}')">👁 Voir la réponse</button>
            <button class="qbtn" onclick="clearAns('${q.id}')">↺ Effacer</button>
          </div>
          ${ST.revealed[q.id]?renderCorr(q.id,q.rep,evl):""}
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function renderCorr(qid,rep,evl){
  const sel=evl===undefined?`
    <div class="self-ev">
      <div class="sel-t">Auto-évaluation — comparez votre réponse :</div>
      <div class="ev-row">
        <button class="ev-btn ev0" onclick="setEv('${qid}',0)">✗ À retravailler</button>
        <button class="ev-btn ev1" onclick="setEv('${qid}',1)">~ Partiellement</button>
        <button class="ev-btn ev2" onclick="setEv('${qid}',2)">✓ Maîtrisée</button>
      </div>
    </div>`:"";
  return`<div class="corr">
    <div class="corr-t">✔ Éléments de réponse attendus</div>
    ${rep.map(r=>`<div class="corr-item"><span class="cd">•</span><span>${safe(r)}</span></div>`).join("")}
  </div>${sel}`;
}

function reveal(qid){stopTmr(qid);ST.revealed[qid]=true;renderQs();}
function clearAns(qid){ST.answers[qid]="";const el=document.getElementById("ans-"+qid);if(el)el.value="";}

async function setEv(qid,val){
  if(!ST.evals[ST.mod])ST.evals[ST.mod]={};
  ST.evals[ST.mod][qid]=val;
  renderConform();renderStats();renderQs();
  try{await apiPost({action:"saveEval",email:ST.uid,mod:ST.mod,qid,score:val});}catch(e){}
}

function startTmr(qid){
  if(ST.timers[qid])return;
  const el=document.getElementById("tmr-"+qid);let s=0;
  ST.timers[qid]=setInterval(()=>{
    s++;const m=Math.floor(s/60),sec=s%60;
    if(el){el.textContent="⏱ "+m+":"+(sec<10?"0":"")+sec;
      el.className="tmr"+(s>600?" red":s>480?" warn":"");}
    if(s>=600)stopTmr(qid);
  },1000);
}
function stopTmr(qid){if(ST.timers[qid]){clearInterval(ST.timers[qid]);delete ST.timers[qid];}}

// ── DÉMARRAGE — accès direct à l'app ──
initApp();
</script>
</body>
</html>
